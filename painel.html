<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório</title>

<style>
body{
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#0c4a6e,#2563eb);
  padding:20px;
  color:#0f172a;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  color:#64748b;
  margin-bottom:20px;
}

.card{
  background:#f8fafc;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border-left:6px solid #2563eb;
}

.pergunta{
  font-weight:600;
  margin-bottom:8px;
}

.resultado{
  font-size:14px;
  margin-bottom:10px;
}

.barra{
  background:#e2e8f0;
  height:10px;
  border-radius:5px;
  margin-bottom:10px;
  overflow:hidden;
}

.progresso{
  height:10px;
  border-radius:5px;
}

.valor{
  font-size:13px;
  margin-bottom:4px;
}

.nivelBox{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  text-align:center;
  font-size:20px;
  background:#f1f5f9;
}

button{
  margin-top:20px;
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

.center{text-align:center;}
</style>
</head>

<body>

<div class="container">

<h1 id="tituloEmpresa">Carregando...</h1>
<div class="sub">Relatório Psicossocial</div>

<div id="relatorio"></div>

<div class="center">
  <button onclick="voltar()">⬅ Voltar</button>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const URL = "https://script.google.com/macros/s/AKfycbzRXsUd8pDea5c6JO18qxT49Rp2YPr1U4qhKI1QnvN0ODHJHdIyPUQ7uTIGxR78Llk/exec";

let params = new URLSearchParams(window.location.search);
let cnpj = String(params.get("cnpj") || "").trim();
let nome = params.get("nome");
let cargoFiltro = String(params.get("cargo") || "").trim();

let titulo = document.getElementById("tituloEmpresa");
let relatorio = document.getElementById("relatorio");

// 🔥 FUNÇÃO DE NORMALIZAÇÃO (ADICIONADA)
function normalizar(txt){
  return String(txt || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[̀-ͯ]/g, "")
    .trim();
}

const perguntasTipo = {
  p1:"positiva", p2:"negativa", p3:"positiva",
  p4:"positiva", p5:"positiva", p6:"positiva",
  p7:"positiva", p8:"positiva", p9:"positiva",
  p10:"positiva", p11:"positiva", p12:"positiva",
  p13:"positiva", p14:"positiva",
  p15:"positiva", p16:"negativa", p17:"positiva",
  p18:"negativa", p19:"negativa", p20:"negativa",
  p21:"positiva", p22:"positiva", p23:"positiva",
  p24:"positiva", p25:"positiva", p26:"positiva",
  p27:"positiva", p28:"negativa", p29:"positiva"
};

async function carregar(){

  try{

    relatorio.innerHTML = "";

    const resposta = await fetch(
  URL + "?cnpj=" + encodeURIComponent(cnpj) + "&cargo=" + encodeURIComponent(cargoFiltro)
);
    const dados = await resposta.json();

    let respostas = [];

    dados.forEach(d => {

      let cnpjLinha = String(d.cnpj || "").trim();

      // 🔥 NORMALIZAÇÃO AQUI (CORRIGIDO)
      let cargoLinha = normalizar(d.cargo || "Não informado");

      if(cnpjLinha === cnpj){

        // 🔥 COMPARAÇÃO CORRIGIDA
        if(!cargoFiltro || cargoLinha === normalizar(cargoFiltro)){
          respostas.push(d);
        }
      }
    });

    // 🔎 DEBUG (opcional, pode apagar depois)
    console.log("Respostas encontradas:", respostas.length);

    if(respostas.length === 0){
      titulo.innerText = "Nenhum dado encontrado";
      return;
    }

    titulo.innerText = `${nome} - ${cargoFiltro || "Geral"}`;

    let contagem = {};

    respostas.forEach(r => {

      let resp;

      try {
        resp = JSON.parse(r.respostas || "{}");
      } catch {
        resp = {};
      }

      for(let i=1;i<=29;i++){

        let p = "p"+i;
        let val = normalizar(resp[p]); // 🔥 MELHORADO

        if(!contagem[p]) contagem[p] = {};
        if(!contagem[p][val]) contagem[p][val] = 0;

        contagem[p][val]++;
      }
    });

    let pontuacao = 0;
    let totalPerguntas = 0;

    for(let i=1;i<=29;i++){

      let chave = "p"+i;
      let obj = contagem[chave];

      if(!obj) continue;

      let total = Object.values(obj).reduce((a,b)=>a+b,0);
      if(total === 0) continue;

      totalPerguntas++;

      let principal = Object.keys(obj)
        .reduce((a,b)=> obj[a] > obj[b] ? a : b);

      let tipoPergunta = perguntasTipo[chave];

      let tipo;

      if(tipoPergunta === "positiva"){
        if(principal === "sempre") tipo = "bom";
        else if(principal.includes("vez")) tipo = "medio";
        else tipo = "ruim";
      }else{
        if(principal === "sempre") tipo = "ruim";
        else if(principal.includes("vez")) tipo = "medio";
        else tipo = "bom";
      }

      if(tipo === "ruim") pontuacao += 2;
      else if(tipo === "medio") pontuacao += 1;

      let card = document.createElement("div");
      card.className = "card";

      let html = `
        <div class="pergunta">Pergunta ${i}</div>
        <div class="resultado">Resposta principal: <b>${principal}</b></div>
      `;

      for(let r in obj){

        let qtd = obj[r];
        let pct = Math.round((qtd/total)*100);

        let cor = "#16a34a";

        if(tipoPergunta === "positiva"){
          if(r === "sempre") cor = "#16a34a";
          else if(r.includes("vez")) cor = "#f59e0b";
          else cor = "#dc2626";
        }else{
          if(r === "sempre") cor = "#dc2626";
          else if(r.includes("vez")) cor = "#f59e0b";
          else cor = "#16a34a";
        }

        html += `
          <div class="valor">${r} (${pct}%)</div>
          <div class="barra">
            <div class="progresso" style="width:${pct}%; background:${cor}"></div>
          </div>
        `;
      }

      card.innerHTML = html;
      relatorio.appendChild(card);
    }

    let media = totalPerguntas ? pontuacao/totalPerguntas : 0;

    let nivel = "Baixo";
    let cor = "#16a34a";

    if(media >= 1.3){ nivel="Alto"; cor="#dc2626"; }
    else if(media >= 0.6){ nivel="Médio"; cor="#f59e0b"; }

    let box = document.createElement("div");
    box.className="nivelBox";
    box.innerHTML = `Nível de Risco: <b style="color:${cor}">${nivel}</b>`;

    relatorio.appendChild(box);

  }catch(e){
    console.error(e);
    titulo.innerText = "Erro ao carregar relatório";
  }
}

window.voltar = function(){
  window.location.href = "cargos.html?cnpj="
  + encodeURIComponent(cnpj)
  + "&nome=" + encodeURIComponent(nome);
}

carregar();

});
</script>

</body>
</html>
